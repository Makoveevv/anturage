<!DOCTYPE html>
<html lang="ru">
  <head>

    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <meta name="robots" content="noindex, follow">

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="assets/img/favicon/favicon-96x96.png" sizes="96x96" />
    <link rel="icon" type="image/svg+xml" href="assets/img/favicon/favicon.svg" />
    <link rel="shortcut icon" href="assets/img/favicon/favicon.ico" />
    <link rel="apple-touch-icon" sizes="180x180" href="assets/img/favicon/apple-touch-icon.png" />
    <link rel="manifest" href="assets/img/favicon/site.webmanifest" />

    <title>Страница не найдена (404) — Антураж</title>

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Comfortaa:wght@400&family=Roboto:wght@400;500;700&display=swap" rel="stylesheet" media="print" onload="this.media='all'">
    <noscript><link href="https://fonts.googleapis.com/css2?family=Comfortaa:wght@400&family=Roboto:wght@400;500;700&display=swap" rel="stylesheet"></noscript>

    <style>
      :root {
        --accent: #5EA0E7;
        --bg: #F4F8FD;
        --text: #415460;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 24px;
        background-color: var(--bg);
        color: var(--text);
        font-family: "Roboto", sans-serif;
        text-align: center;
      }
      .nf__logo { width: 180px; max-width: 100%; margin-bottom: 32px; }
      .nf__code {
        font-family: "Comfortaa", sans-serif;
        font-size: 96px;
        line-height: 1;
        color: var(--accent);
        margin: 0;
      }
      .nf__title {
        font-family: "Comfortaa", sans-serif;
        font-size: 24px;
        margin: 16px 0 8px;
      }
      .nf__text { font-size: 16px; max-width: 460px; margin: 0 auto 28px; }
      .nf__links {
        display: flex;
        flex-wrap: wrap;
        gap: 12px;
        justify-content: center;
      }
      .nf__link {
        display: inline-block;
        padding: 10px 20px;
        border: 2px solid var(--accent);
        border-radius: 8px;
        text-decoration: none;
        color: var(--accent);
        font-weight: 500;
        transition: background-color .2s, color .2s;
      }
      .nf__link:hover { background-color: var(--accent); color: #fff; }
      .nf__link--primary { background-color: var(--accent); color: #fff; }
      .nf__link--primary:hover { background-color: #4a8fd6; }
    </style>

  </head>

  <body>

    <a href="/"><img class="nf__logo" src="assets/img/logo.svg" alt="Антураж" width="193" height="47"></a>

    <p class="nf__code">404</p>
    <h1 class="nf__title">Страница не найдена</h1>
    <p class="nf__text">
      Похоже, такой страницы нет или она была перемещена.
      Вернитесь на главную или загляните в один из наших разделов.
    </p>

    <div class="nf__links">
      <a class="nf__link nf__link--primary" href="/">На главную</a>
      <a class="nf__link" href="paintings.html">Картины и постеры</a>
      <a class="nf__link" href="wallpapers.html">Фотообои и фрески</a>
      <a class="nf__link" href="sale.html">Распродажа</a>
      <a class="nf__link" href="price.html">Цены</a>
    </div>

  </body>
</html>
